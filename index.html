<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Dearest Mihika 💖</title>

<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #ffd6e0, #ffc2d1);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .container {
        text-align: center;
        padding: 20px;
        width: 100%;
        max-width: 400px;
    }

    h1 {
        color: #ff4d6d;
        font-size: 28px;
        margin-bottom: 15px;
    }

    .card {
        background: white;
        padding: 20px;
        margin: 15px 0;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        animation: float 4s ease-in-out infinite;
    }

    .card:nth-child(3) {
        animation-delay: 1s;
    }

    .card:nth-child(4) {
        animation-delay: 2s;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0px); }
    }

    .btn {
        background: #ff4d6d;
        color: white;
        border: none;
        padding: 12px 25px;
        font-size: 16px;
        border-radius: 30px;
        cursor: pointer;
        margin-top: 15px;
        transition: 0.3s;
    }

    .btn:hover {
        background: #ff1e4d;
        transform: scale(1.05);
    }

    .heart {
        position: fixed;
        bottom: -20px;
        font-size: 20px;
        animation: rise 5s linear infinite;
        color: #ff4d6d;
    }

    @keyframes rise {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
    }

    @media(max-width:480px){
        h1 { font-size: 22px; }
        .card { font-size: 14px; }
    }
</style>
</head>
<body>

<div class="container">
    <h1 id="mainHeading"></h1>

    <div class="card" id="card1"></div>
    <div class="card" id="card2"></div>
    <div class="card" id="card3"></div>

    <button class="btn" onclick="playMusic()">Tap if you are Happy Happy Miu now 🥰💕</button>
</div>

<script>

/* =========================
   ✏️ EDIT YOUR TEXT HERE
   ========================= */

const PAGE_TITLE = "For Dearest Mihika 💖";
const HEADING_TEXT = "Dearest Mihika, Pyari Si Behna 🥺💗";

const MESSAGE_1 = "I know we had a fight, and even though you were sweet enough to forgive me 🙁, I still feel guilty for hurting you Itna.";
const MESSAGE_2 = "You genuinely mean alot to me. I never want to treat you wrong.";
const MESSAGE_3 = "Thank you for always being there for me. You are the sweetest❤️❤️ Am Really sorry yaar pls maaf karde🥺. Zaroorat hai yaar teri ATP😔";

const BUTTON_TEXT = "Tap if you are Happy Happy Miu now 🥰💕";
const MUSIC_FILE = "haledil.mp3"; // Make sure this file is in same folder


/* =========================
   🚀 DON'T EDIT BELOW
   ========================= */

document.title = PAGE_TITLE;
document.getElementById("mainHeading").innerText = HEADING_TEXT;
document.getElementById("card1").innerText = MESSAGE_1;
document.getElementById("card2").innerText = MESSAGE_2;
document.getElementById("card3").innerText = MESSAGE_3;
document.querySelector(".btn").innerText = BUTTON_TEXT;

const audio = new Audio(MUSIC_FILE);

function playMusic() {
    audio.play();
}

function createHearts() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHearts, 500);

</script>

</body>
</html>
